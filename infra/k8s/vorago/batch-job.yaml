# =============================================================================
# OculusVorago — Batch ETL Job
# Use this manifest for ONE-SHOT processing of large CSV / file-based data.
# Kubernetes will run the Job to completion and then clean up the pod.
#
# Customise the args below (--source, --config, etc.) before running.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  # Include a unique suffix (e.g. dataset name + date) to allow re-runs
  name: vorago-batch-icij-2024
  namespace: oculus
  labels:
    app: vorago-batch
    app.kubernetes.io/part-of: oculus-platform
    app.kubernetes.io/component: etl-batch
spec:
  # Retry up to 3 times on failure before marking the Job as failed
  backoffLimit: 3
  # Automatically clean up the Job resource 24 hours after completion
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: vorago-batch
        app.kubernetes.io/part-of: oculus-platform
        app.kubernetes.io/component: etl-batch
    spec:
      containers:
        - name: vorago
          image: ghcr.io/ihammoumi-pro/oculus-vorago:latest
          imagePullPolicy: Always
          # ENTRYPOINT is ["python", "main.py"] — supply the pipeline arguments here.
          # Mount your CSV data via a PVC or a ConfigMap if the file is small.
          args:
            - "run-pipeline"
            - "--extractor"
            - "csv"
            - "--source"
            - "/data/input.csv"
            - "--config"
            - "/configs/icij_mapping.yaml"
            - "--loader"
            - "kafka"
            - "--log-level"
            - "INFO"
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: oculus-kafka-secret
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: oculus-app-config
                  key: VORAGO_LOG_LEVEL
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            # Mount your input data here.  Create a PVC named "vorago-data-pvc"
            # and pre-populate it with the CSV files to process.
            - name: data-volume
              mountPath: /data
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
      restartPolicy: Never
      volumes:
        # Bind a PVC or use an emptyDir / ConfigMap for the input data.
        # Replace "vorago-data-pvc" with your actual PersistentVolumeClaim name.
        - name: data-volume
          persistentVolumeClaim:
            claimName: vorago-data-pvc
