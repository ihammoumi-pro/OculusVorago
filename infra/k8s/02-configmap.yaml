# =============================================================================
# ConfigMap — non-sensitive platform-wide application configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: oculus-app-config
  namespace: oculus
  labels:
    app.kubernetes.io/part-of: oculus-platform
data:
  # --------------------------------------------------------------------------
  # OculusOntologia (Backend API) settings
  # --------------------------------------------------------------------------
  LOG_LEVEL: "INFO"
  GRAPHQL_PATH: "/graphql"
  # Number of Gunicorn worker processes — typically (2 * CPU cores) + 1
  GUNICORN_WORKERS: "4"
  GUNICORN_TIMEOUT: "120"

  # --------------------------------------------------------------------------
  # OculusAperio (Frontend) settings
  # --------------------------------------------------------------------------
  # Internal cluster endpoint for server-side GraphQL calls (SSR)
  NEXT_PUBLIC_GRAPHQL_URL: "http://ontologia-api-svc.oculus.svc.cluster.local:8000/graphql"
  # External endpoint surfaced to browsers (via Ingress)
  NEXT_PUBLIC_GRAPHQL_EXTERNAL_URL: "https://oculus.example.com/graphql"

  # --------------------------------------------------------------------------
  # OculusVorago (ETL Engine) settings
  # --------------------------------------------------------------------------
  KAFKA_TOPIC: "oculus.ingestion.raw"
  VORAGO_LOG_LEVEL: "INFO"
