# =============================================================================
# OculusVorago — Streaming ETL Deployment
# Use this manifest when Vorago is running in STREAMING mode (continuous
# ingestion from an API or long-lived Kafka-connected source).
# For batch / CSV processing, use job.yaml or cronjob.yaml instead.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vorago-streaming
  namespace: oculus
  labels:
    app: vorago-streaming
    app.kubernetes.io/part-of: oculus-platform
    app.kubernetes.io/component: etl-streaming
spec:
  # 2 replicas for HA — ensures ingestion continues during pod restarts or node failures.
  # If your upstream API source does not support concurrent consumers without producing
  # duplicates, set replicas to 1 and rely on pod restart policy for resilience.
  replicas: 2
  selector:
    matchLabels:
      app: vorago-streaming
  template:
    metadata:
      labels:
        app: vorago-streaming
        app.kubernetes.io/part-of: oculus-platform
        app.kubernetes.io/component: etl-streaming
    spec:
      containers:
        - name: vorago
          image: ghcr.io/ihammoumi-pro/oculus-vorago:latest
          imagePullPolicy: Always
          # ENTRYPOINT is ["python", "main.py"] — pass the CLI arguments here.
          # Adjust --source and --config to point to your actual data source.
          args:
            - "run-pipeline"
            - "--extractor"
            - "api"
            - "--source"
            - "https://data.example.com/api/records"
            - "--config"
            - "/configs/icij_mapping.yaml"
            - "--loader"
            - "kafka"
            - "--log-level"
            - "INFO"
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: oculus-kafka-secret
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: oculus-app-config
                  key: VORAGO_LOG_LEVEL
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # Liveness probe: restart the pod if the Python process becomes unresponsive
          # or hangs (e.g., blocked on a stalled network connection).
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
      restartPolicy: Always
