# =============================================================================
# OculusVorago — ETL-specific Secret
#
# Contains ONLY Vorago-specific credentials.
# Global infrastructure secrets (Kafka, Postgres, etc.) are provided by the
# OculusCodex shared Secret "global-platform-secrets" mounted via envFrom.
#
# Populate before deploying — NEVER commit real credentials here.
# Recommended approach (CI/CD or GitOps):
#
#   kubectl create secret generic vorago-secret \
#     --namespace oculus-apps
#
# For production, consider the External Secrets Operator to sync from
# AWS Secrets Manager, HashiCorp Vault, or Azure Key Vault.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: vorago-secret
  namespace: oculus-apps
  labels:
    app.kubernetes.io/name: vorago
    app.kubernetes.io/component: etl-engine
    app.kubernetes.io/managed-by: OculusCodex
type: Opaque
stringData:
  # Add Vorago-specific secrets here as needed.
  # Global keys (KAFKA_BOOTSTRAP_SERVERS, DATABASE_URL, etc.) are supplied by
  # the platform-level "global-platform-secrets" Secret defined in OculusCodex.
