# =============================================================================
# Secrets — NEVER hardcode real values here.
# Populate these Secrets before deploying, e.g. with:
#
#   kubectl create secret generic oculus-db-secret \
#     --namespace oculus \
#     --from-literal=POSTGRES_USER=oculus_user \
#     --from-literal=POSTGRES_PASSWORD='<your-strong-password>' \
#     --from-literal=POSTGRES_DB=oculusdb \
#     --from-literal=DATABASE_URL='postgresql://oculus_user:<password>@postgres-svc:5432/oculusdb'
#
# Or use an external secrets manager (e.g., Vault, AWS Secrets Manager) and
# an operator like External Secrets Operator to populate these automatically.
#
# The placeholder values below are BASE64-encoded strings of "CHANGE_ME".
# Replace them before applying to any real environment.
# =============================================================================

# ---------------------------------------------------------------------------
# PostgreSQL credentials
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: oculus-db-secret
  namespace: oculus
  labels:
    app.kubernetes.io/part-of: oculus-platform
type: Opaque
stringData:
  # ⚠  Replace all values below with real credentials before deployment ⚠
  POSTGRES_USER: "CHANGE_ME"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "oculusdb"
  DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@postgres-svc.oculus.svc.cluster.local:5432/oculusdb"

---
# ---------------------------------------------------------------------------
# Neo4j credentials
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: oculus-neo4j-secret
  namespace: oculus
  labels:
    app.kubernetes.io/part-of: oculus-platform
type: Opaque
stringData:
  # ⚠  Replace all values below with real credentials before deployment ⚠
  NEO4J_URI: "bolt://neo4j-svc.oculus.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "CHANGE_ME"

---
# ---------------------------------------------------------------------------
# Kafka credentials / connection details
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: oculus-kafka-secret
  namespace: oculus
  labels:
    app.kubernetes.io/part-of: oculus-platform
type: Opaque
stringData:
  # ⚠  Replace all values below with real broker addresses before deployment ⚠
  KAFKA_BOOTSTRAP_SERVERS: "kafka-svc.oculus.svc.cluster.local:9092"
