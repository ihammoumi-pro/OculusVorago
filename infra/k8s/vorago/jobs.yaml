# =============================================================================
# OculusVorago — Batch ETL Job
# Use this manifest for ONE-SHOT processing of large CSV / file-based data.
# Kubernetes will run the Job to completion and then clean up the pod.
#
# Customise the args below (--source, --config, etc.) before running.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  # Include a unique suffix (e.g. dataset name + date) to allow re-runs
  name: vorago-batch-icij-2024
  namespace: oculus-apps
  labels:
    app.kubernetes.io/name: vorago
    app.kubernetes.io/component: etl-batch
    app.kubernetes.io/managed-by: OculusCodex
spec:
  # Retry up to 3 times on failure before marking the Job as failed
  backoffLimit: 3
  # Automatically clean up the Job resource 24 hours after completion
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vorago
        app.kubernetes.io/component: etl-batch
        app.kubernetes.io/managed-by: OculusCodex
    spec:
      containers:
        - name: vorago
          image: ghcr.io/ihammoumi-pro/oculus-vorago:latest
          imagePullPolicy: Always
          # ENTRYPOINT is ["python", "main.py"] — supply the pipeline arguments here.
          # Mount your CSV data via a PVC or a ConfigMap if the file is small.
          args:
            - "run-pipeline"
            - "--extractor"
            - "csv"
            - "--source"
            - "/data/input.csv"
            - "--config"
            - "/configs/icij_mapping.yaml"
            - "--loader"
            - "kafka"
            - "--log-level"
            - "INFO"
          # Global platform ConfigMaps/Secrets are mounted via envFrom as required
          # by the OculusCodex platform convention (see OculusCodex PR #1).
          # This pattern loads all keys from each resource; the keys consumed by
          # Vorago are: KAFKA_BOOTSTRAP_SERVERS (oculus-kafka-config),
          # LOG_LEVEL and KAFKA_TOPIC (vorago-config).
          # App-specific refs are listed last so their values win on any collision.
          envFrom:
            - configMapRef:
                name: oculus-kafka-config
            - configMapRef:
                name: oculus-postgres-config
            - configMapRef:
                name: oculus-platform-config
            - secretRef:
                name: global-platform-secrets
            - configMapRef:
                name: vorago-config      # Vorago-specific keys (KAFKA_TOPIC, LOG_LEVEL)
            - secretRef:
                name: vorago-secret      # Vorago-specific secrets (reserved for future use)
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: data-volume
              mountPath: /data
              readOnly: true
            # Writable /tmp for OCR (pytesseract) and PDF (pdf2image) temp files
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            # Root filesystem is read-only; OCR (pytesseract) and PDF (pdf2image)
            # libraries write temp files to /tmp which is mounted as emptyDir below.
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
      restartPolicy: Never
      volumes:
        # Bind a PVC or use an emptyDir / ConfigMap for the input data.
        # Replace "vorago-data-pvc" with your actual PersistentVolumeClaim name.
        - name: data-volume
          persistentVolumeClaim:
            claimName: vorago-data-pvc
        # Writable scratch space for OCR and PDF processing temp files
        - name: tmp
          emptyDir: {}
