# =============================================================================
# OculusOntologia — Kafka Consumer Worker
# Deployed as a separate Deployment so it can scale independently
# from the GraphQL API pod.
# =============================================================================

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ontologia-consumer
  namespace: oculus
  labels:
    app: ontologia-consumer
    app.kubernetes.io/part-of: oculus-platform
    app.kubernetes.io/component: backend-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ontologia-consumer
  template:
    metadata:
      labels:
        app: ontologia-consumer
        app.kubernetes.io/part-of: oculus-platform
        app.kubernetes.io/component: backend-consumer
    spec:
      # Spread pods across nodes for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ontologia-consumer
      containers:
        - name: ontologia-consumer
          # Uses the same image as the API; a different CMD/entrypoint starts the consumer process
          image: ghcr.io/ihammoumi-pro/oculus-ontologia:latest
          imagePullPolicy: Always
          # Override the default command to start the Kafka consumer worker process
          command: ["python", "-m", "consumer"]
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: oculus-app-config
                  key: LOG_LEVEL
          # Load all sensitive credentials from Secrets
          envFrom:
            - secretRef:
                name: oculus-db-secret
            - secretRef:
                name: oculus-neo4j-secret
            - secretRef:
                name: oculus-kafka-secret
          # Consumer pods are long-running; no HTTP health endpoint, use exec probe
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
      restartPolicy: Always

---
# ---------------------------------------------------------------------------
# HorizontalPodAutoscaler — scale consumer on CPU utilisation
# ---------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ontologia-consumer-hpa
  namespace: oculus
  labels:
    app: ontologia-consumer
    app.kubernetes.io/part-of: oculus-platform
    app.kubernetes.io/component: backend-consumer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ontologia-consumer
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
