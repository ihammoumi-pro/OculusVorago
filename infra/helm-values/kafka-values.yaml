# =============================================================================
# Kafka (KRaft mode, no Zookeeper) — Bitnami Helm values override
#
# Install command:
#
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm repo update
#
#   helm upgrade --install kafka bitnami/kafka \
#     --namespace oculus \
#     --create-namespace \
#     --version ">=26.0.0" \
#     -f infra/helm-values/kafka-values.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# KRaft mode — no Zookeeper dependency (recommended for new deployments)
# ---------------------------------------------------------------------------
kraft:
  enabled: true

zookeeper:
  enabled: false

# ---------------------------------------------------------------------------
# Broker configuration
# ---------------------------------------------------------------------------
replicaCount: 3          # 3 brokers for HA and RF=3

controller:
  replicaCount: 3        # Combined broker+controller nodes (KRaft)

# ---------------------------------------------------------------------------
# Persistence — each broker gets its own PVC
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  size: 20Gi
  storageClass: ""       # leave empty to use default StorageClass

# ---------------------------------------------------------------------------
# Resource limits
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# ---------------------------------------------------------------------------
# Default topic creation
# ---------------------------------------------------------------------------
provisioning:
  enabled: true
  topics:
    - name: oculus.ingestion.raw
      partitions: 6
      replicationFactor: 3
      config:
        retention.ms: "604800000"   # 7 days retention
        compression.type: "lz4"

# ---------------------------------------------------------------------------
# Metrics sidecar for Prometheus scraping (optional)
# ---------------------------------------------------------------------------
metrics:
  jmx:
    enabled: true
  kafka:
    enabled: true
