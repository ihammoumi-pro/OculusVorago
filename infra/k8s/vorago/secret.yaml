# =============================================================================
# OculusVorago — ETL-specific Secret
#
# Contains only the credentials required by the Vorago ETL engine itself.
# Namespace and shared infrastructure Secrets are managed by OculusCodex.
#
# Populate before deploying — NEVER commit real credentials here.
# Recommended approach (CI/CD or GitOps):
#
#   kubectl create secret generic vorago-secret \
#     --namespace oculus \
#     --from-literal=KAFKA_BOOTSTRAP_SERVERS='kafka-svc.oculus.svc.cluster.local:9092'
#
# For production, consider the External Secrets Operator to sync from
# AWS Secrets Manager, HashiCorp Vault, or Azure Key Vault.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: vorago-secret
  namespace: oculus
  labels:
    app.kubernetes.io/name: vorago
    app.kubernetes.io/component: etl-engine
type: Opaque
stringData:
  # ⚠  Replace with the real Kafka broker address before deployment ⚠
  KAFKA_BOOTSTRAP_SERVERS: "kafka-svc.oculus.svc.cluster.local:9092"
